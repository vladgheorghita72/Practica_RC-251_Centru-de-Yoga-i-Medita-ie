<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstrație Precizie Layout</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        .flex-container {
            display: flex;
            height: 80vh;
            border: 6px double #2c3e50;
            background-color: white;
            margin-bottom: 50px;
            
            align-items: flex-start; 
        }

        .box {
            width: 100px;
            height: 100px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .box-1 {
            background-color: #e74c3c;
            
        }

        .box-2 {
            background-color: #3498db;
            
            margin: auto;
        }

        .box-3 {
            background-color: #27ae60;
            align-self: flex-end;
        }

        .grid-container {
            display: grid;
            /* 2 coloane egale */
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        .grid-item {
            padding: 40px;
            text-align: center;
            color: #333;
            font-weight: bold;
            background-color: rgba(52, 152, 219, 0.2);
            border: 2px dashed rgba(52, 152, 219, 0.5);
        }

        .item-1 {
        
            grid-column: span 2;
            background-color: rgba(155, 89, 182, 0.3);
        }

    </style>
</head>
<body>

    <h2>A. Provocarea Flexbox (Geometrie)</h2>
    <div class="flex-container">
        
            
        <div class="box box-1">Box 1</div>
        <div class="box box-2">Box 2</div>
        <div class="box box-3">Box 3</div>
    </div>

    <h2>B. Provocarea Grid (Mozaic)</h2>
    <div class="grid-container">
        <div class="grid-item item-1">Element 1 (Full Width)</div>
        <div class="grid-item">Element 2</div>
        <div class="grid-item">Element 3</div>
        <div class="grid-item">Element 4</div>
    </div>

</body>
</html>
